<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Chat Overlay</title>
  <link rel="stylesheet" href="/overlay/overlay.css" />
</head>
<body>
  <div id="app">
    <header id="header" class="header hidden">
      <div id="header-title" class="header-title"></div>
      <div id="header-tagline" class="header-tagline hidden"></div>
    </header>
    <div id="feed" class="feed"></div>
  </div>
  <div id="obs-error" class="hidden" style="position:fixed;bottom:8px;left:8px;right:8px;background:rgba(180,30,30,0.9);color:#fff;padding:8px 12px;border-radius:6px;font-size:13px;z-index:9999;text-align:center;"></div>
  <style>#obs-error.hidden{display:none}</style>
  <script src="/overlay/overlay-standalone.js"></script>
</body>
</html>
